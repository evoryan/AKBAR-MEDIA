name: Build Android APK

on:
  push:
    branches:
      - main  # Ganti ke master jika branch utama Anda bernama master
  workflow_dispatch: # Memungkinkan Anda memicu build secara manual dari web GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. DIUBAH: Menggunakan JDK 20 agar sinkron dengan format Keystore Anda
      - name: Setup JDK 20
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '20'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Make Gradle executable
        run: chmod +x gradlew

      # 2. DIUBAH: Mem-build APK versi Release (bukan debug)
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 3. LANGKAH BARU: Menandatangani APK menggunakan 4 GitHub Secrets Anda
      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          singleOutputFile: true

      # 4. DIUBAH: Mengunggah file APK resmi hasil tanda tangan digital Anda
      - name: Upload Official Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Akbar-Media-Official-Release
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
