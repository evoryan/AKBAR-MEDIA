name: Build Android APK
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Gradle, Generate Real Debug Keystore & Fix KSP Bug
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper
          fi
          chmod +x ./gradlew
          
          # Membuat file debug.keystore asli dengan sertifikat valid (Password standar Android: android)
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # Trik Isolasi Memori KSP
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Djava.awt.headless=true -Xmx2048m" >> ~/.gradle/gradle.properties
          echo "ksp.use.daemon=false" >> gradle.properties
          echo "kotlin.compiler.execution.strategy=in-process" >> gradle.properties
          
      - name: Build with Gradle (Total Force Build)
        run: |
          ./gradlew assembleDebug \
            -x lint -x test \
            --no-daemon \
            -Dorg.gradle.workers.max=1 \
            -Djava.awt.headless=true
            
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
