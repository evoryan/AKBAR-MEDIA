name: Build Android APK

on:
  push:
    branches:
      - main  # Sesuaikan jika branch utama Anda bernama master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Menggunakan JDK 17 Resmi & Stabil
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Make Gradle executable
        run: chmod +x gradlew

      # Mem-build APK mentah dengan konfigurasi Gradle yang sudah aman
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # Menandatangani APK mentah menggunakan GitHub Secrets Anda secara resmi
      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          singleOutputFile: true

      # Mengunggah APK Rilis Resmi yang aman dari konflik instalasi update
      - name: Upload Official Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Akbar-Media-Official-Release
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
