name: Build Android APK
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle & Fix Keystore Location
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper
          fi
          chmod +x ./gradlew
          
          # Membuat file keystore kosong tepat di folder root tempat Gradle mencari file tersebut
          touch debug.keystore
          
      - name: Build with Gradle (Fix KSP & Signing)
        run: ./gradlew assembleDebug -x lint -x test -Dksp.use.daemon=false -Dorg.gradle.workers.max=1
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
