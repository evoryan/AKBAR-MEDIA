name: Build Android APK

on:
  push:
    branches:
      - main  # Ganti ke master jika branch utama Anda bernama master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # LANGKAH BARU: Menginstal Gradle CLI langsung di server GitHub karena gradlew tidak ada
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      # LANGKAH BARU: Membuat file gradlew secara otomatis di dalam server
      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: "**/build/outputs/apk/release/*.apk"
