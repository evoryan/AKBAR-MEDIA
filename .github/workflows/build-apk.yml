name: Build Android APK

on:
  push:
    branches:
      - main # Skrip berjalan otomatis setiap kali ada push kode ke branch main
  workflow_dispatch: # Memungkinkan Anda memicu build secara manual dari web GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Memberikan izin eksekusi pada Gradle Wrapper
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # Memproses kompilasi kode Kotlin menjadi APK Debug
      - name: Build APK with Gradle
        run: ./gradlew assembleDebug

      # Mengunggah hasil APK agar bisa diunduh dari browser/HP
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Akbar-Media-APK
          path: app/build/outputs/apk/debug/app-debug.apk
