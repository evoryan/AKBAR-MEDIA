name: Build Android APK

on:
  push:
    branches:
      - main  # Ganti ke master jika branch utama Anda bernama master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Make Gradle executable
        run: chmod +x gradlew

      # LANGKAH BARU: Membuat file debug.keystore otomatis agar tidak memicu error missing key
      - name: Generate Dummy Debug Keystore
        run: |
          # Buat kunci tiruan standar
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # Salin kunci tersebut ke semua folder yang mungkin dicari oleh Gradle
          mkdir -p app/
          cp debug.keystore app/debug.keystore
          
          # Pastikan file terbaca dengan menampilkan daftarnya (opsional untuk log)
          ls -la
          ls -la app/


      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
