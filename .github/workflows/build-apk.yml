name: Build Android APK

on:
  push:
    branches:
      - main  # Sesuaikan jika branch utama Anda bernama master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Menggunakan JDK 17 Resmi & Stabil
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Make Gradle executable
        run: chmod +x gradlew

      # Membuat file debug.keystore otomatis agar validasi awal Gradle lolos
      - name: Generate Dummy Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      # Mem-build APK Release dengan opsi headless untuk KSP
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Djava.awt.headless=true -Dorg.gradle.jvmargs=-Djava.awt.headless=true"

      # Menghubungkan otomatis zipalign modern ke environment sistem cloud
      - name: Setup Android Build Tools Path
        run: |
          LATEST_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          echo "$LATEST_TOOLS" >> $GITHUB_PATH
          echo "Menggunakan Android Build Tools versi: $LATEST_TOOLS"

      # Menghubungkan otomatis zipalign modern ke environment sistem cloud
      - name: Setup Android Build Tools Path
        run: |
          LATEST_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          echo "$LATEST_TOOLS" >> $GITHUB_PATH
          echo "BUILD_TOOLS_PATH=$LATEST_TOOLS" >> $GITHUB_ENV
          echo "Menggunakan Android Build Tools versi: $LATEST_TOOLS"

      # LANGKAH BARU: Menguraikan kunci base64 dan menandatangani APK secara manual tanpa action kaku
      - name: Sign Release APK Manual
        run: |
          # 1. Dekode string Base64 dari GitHub Secrets kembali menjadi file Keystore fisik
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > release.jks
          
          # 2. Cari file APK mentah yang dihasilkan oleh Gradle
          RAW_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          
          # 3. Lakukan Zipalign (optimalisasi biner APK)
          zipalign -v 4 "$RAW_APK" app-aligned.apk
          
          # 4. Tandatangani APK menggunakan apksigner resmi dari Build Tools versi terbaru
          $BUILD_TOOLS_PATH/apksigner sign --ks release.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out app-release-signed.apk app-aligned.apk
            
          echo "Penandatanganan selesai resmi!"

      # Mengunggah APK Resmi hasil tanda tangan digital manual Anda
      - name: Upload Official Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Akbar-Media-Official-Release
          path: app-release-signed.apk
